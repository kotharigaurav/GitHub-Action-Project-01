name: CICD Pipeline

on:
    push:
        branches:
            - main

jobs:
    compile:
        runs-on: self-hosted

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup JDK 17
              uses: actions/setup-java@v5
              with:
                distribution: 'temurin' # See 'Supported distributions' for available options
                java-version: '17'
                cache: maven

            - name: Build with Maven
              run: mvn compile

    security-check:
        runs-on: self-hosted
        needs: compile

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              
            - name: Trivy Installation
              run: |
                sudo apt-get install wget gnupg
                wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
                echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
                sudo apt-get update -y
                sudo apt-get install -y trivy

            - name: Trivy FS Scan
              run: trivy fs --format table -o fs-report.json .

            - name: Gitleaks Installation
              run: sudo apt install gitleaks -y

            - name: Gitleaks Code Scan
              run: gitleaks detect source . -r gitleaks-report.json -f json

    unit-test:
        runs-on: self-hosted
        needs: security-check

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup JDK 17
              uses: actions/setup-java@v5
              with:
                distribution: 'temurin' # See 'Supported distributions' for available options
                java-version: '17'
                cache: maven

            - name: Build with Maven
              run: mvn test
              
    sonarqube:
        runs-on: self-hosted
        needs: unit-test

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup JDK 17
              uses: actions/setup-java@v5
              with:
                distribution: 'temurin' # See 'Supported distributions' for available options
                java-version: '17'
                cache: maven
                
            - name: Build Project
              run: mvn package
              
            - name: SonarQube Scan
              uses: actions/checkout@v6
              with:
                # Disabling shallow clones is recommended for improving the relevancy of reporting
                fetch-depth: 0

            - name: SonarQube Scan
              uses: SonarSource/sonarqube-scan-action@<action version or sha1> # Ex: v4.1.0 or sha1, See the latest version at https://github.com/marketplace/actions/official-sonarqube-scan
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

            - name: SonarQube Quality Gate check
              uses: sonarsource/sonarqube-quality-gate-action@master
              with:
                pollingTimeoutSec: 600
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }} #OPTIONAL